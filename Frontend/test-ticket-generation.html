<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Ticket Generation</title>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
</head>
<body>
    <div id="ticket" style="font-family: Courier New, Courier, monospace; padding: 20px; background: white; width: 400px;">
        <h1>Test Ticket</h1>
        <p>Order #12345</p>
        <p>Client: Test Client</p>
        <p>Total: $100.00</p>
    </div>
    
    <button onclick="testConversion()">Test Conversion</button>
    <div id="result"></div>
    
    <script>
        async function testConversion() {
            try {
                const element = document.getElementById('ticket');
                const dataUrl = await htmlToImage.toPng(element);
                
                // Display result
                const img = document.createElement('img');
                img.src = dataUrl;
                document.getElementById('result').innerHTML = '<h2>Success!</h2>';
                document.getElementById('result').appendChild(img);
            } catch (error) {
                document.getElementById('result').innerHTML = '<h2>Error:</h2><pre>' + error.toString() + '</pre>';
                console.error('Conversion error:', error);
            }
        }
    </script>
</body>
</html>
